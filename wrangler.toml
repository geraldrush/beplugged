name = "beplugged-invoicing"
workers_dev = true
preview_urls = true
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
assets = { directory = "public", binding = "ASSETS" }

routes = [
  { pattern = "beplugged.co.za/*", zone_name = "beplugged.co.za" }
]

[vars]
BREVO_REPLY_TO = "info@beplugged.co.za"
BREVO_SENDER_EMAIL = "info@beplugged.co.za"
BREVO_SENDER_NAME = "BepluggedTech"

[[d1_databases]]
binding = "DB"
database_name = "invoicing"
database_id = "8863ff6e-e263-41e1-a3af-a229e776f81d"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }
