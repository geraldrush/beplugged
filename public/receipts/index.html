<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/font-awesome.min.css">
  <style>
    :root {
      --brand-primary: #F05023;
      --brand-primary-dark: #D94119;
      --brand-dark: #2C2D3F;
      --brand-muted: #ffffff;
      --text-muted: rgba(44, 45, 63, 0.7);
      --brand-success: #1f8a52;
    }

    body {
      background-color: var(--brand-muted);
      font-family: 'Poppins', sans-serif;
      padding: 2rem 1rem;
      color: var(--brand-dark);
    }

    .invoice-container {
      max-width: 210mm;
      width: 100%;
      min-height: 297mm;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 0.5rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    .invoice-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--brand-primary);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
      gap: 1rem;
    }

    .brand-logo {
      width: 120px;
      height: auto;
    }

    .company-name {
      color: var(--brand-dark);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 1.1rem;
    }

    .invoice-title {
      color: var(--brand-success);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 1.35rem;
    }

    .invoice-meta {
      margin: 0.25rem 0 0 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .paid-stamp {
      display: inline-block;
      border: 3px solid var(--brand-success);
      color: var(--brand-success);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      padding: 0.4rem 1rem;
      border-radius: 0.4rem;
      transform: rotate(-6deg);
      font-size: 1.1rem;
    }

    .invoice-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .detail-section h3 {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .detail-section p {
      margin: 0.25rem 0;
      color: var(--text-muted);
    }

    table {
      width: 100%;
      margin-bottom: 2rem;
      border-collapse: collapse;
    }

    table thead {
      background-color: #eefaf2;
      border-bottom: 2px solid rgba(31, 138, 82, 0.25);
    }

    table th {
      padding: 0.75rem;
      text-align: left;
      font-weight: 600;
      color: var(--brand-dark);
    }

    table td {
      padding: 0.75rem;
      border-bottom: 1px solid rgba(44, 45, 63, 0.12);
    }

    .totals-footer {
      display: flex;
      justify-content: space-between;
      gap: 2rem;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .banking-info {
      flex: 1;
      min-width: 240px;
      margin-top: 1.25rem;
    }

    .banking-info h3 {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .banking-info p {
      margin: 0;
      color: var(--brand-dark);
      font-weight: 600;
      line-height: 1.4;
      white-space: pre-line;
    }

    .summary {
      width: 320px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
    }

    .summary-row.total {
      border-top: 2px solid rgba(44, 45, 63, 0.2);
      border-bottom: 2px solid rgba(44, 45, 63, 0.2);
      padding: 1rem 0;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .summary-row.paid .label,
    .summary-row.paid .value {
      color: var(--brand-success);
    }

    .qr-below-total {
      margin-top: 0.75rem;
      display: flex;
      justify-content: flex-end;
    }

    .qr-below-total img {
      width: 70px;
      height: 70px;
      padding: 2px;
      background: #fff;
      border: 1px solid rgba(44, 45, 63, 0.2);
      border-radius: 0.25rem;
    }

    .action-buttons.outside {
      display: flex;
      gap: 1rem;
      justify-content: center;
      max-width: 210mm;
      margin: 1rem auto 0;
    }

    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.25rem;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    .btn-primary {
      background-color: var(--brand-primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--brand-primary-dark);
    }

    .btn-secondary {
      background-color: var(--brand-dark);
      color: white;
    }

    .btn-secondary:hover {
      background-color: #1f2030;
    }

    .error {
      background-color: rgba(240, 80, 35, 0.18);
      color: var(--brand-dark);
      padding: 1rem;
      border-radius: 0.25rem;
      border: 1px solid rgba(240, 80, 35, 0.35);
    }

    @media print {
      @page {
        size: A4;
        margin: 10mm;
      }

      body {
        background: white;
        padding: 0;
      }

      .invoice-container {
        box-shadow: none;
        padding: 12mm;
        width: 210mm;
        min-height: 297mm;
      }

      .action-buttons {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .invoice-container {
        min-height: auto;
      }

      .totals-footer {
        flex-direction: column;
      }

      .invoice-details {
        grid-template-columns: 1fr;
      }

      .summary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="invoice-container" id="receipt-container">
    <div style="text-align:center; padding:2rem;">
      <p>Loading receipt...</p>
    </div>
  </div>
  <div class="action-buttons outside">
    <button class="btn btn-secondary" onclick="window.print()">
      <i class="fas fa-print"></i> Print
    </button>
    <button class="btn btn-primary" onclick="downloadPDF()">
      <i class="fas fa-download"></i> Download PDF
    </button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    const API_BASE = '/api';
    let currentReceipt = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const url = new URL(window.location.href);
      const paymentId = url.searchParams.get('id') || window.location.pathname.split('/')[3];
      if (!paymentId) {
        displayError('Receipt ID missing');
        return;
      }
      await loadReceipt(paymentId);
    });

    async function loadReceipt(paymentId) {
      try {
        const response = await fetch(`${API_BASE}/receipt/${paymentId}`);
        const receipt = await response.json();
        if (response.ok && receipt.id) {
          displayReceipt(receipt);
        } else {
          displayError('Receipt not found');
        }
      } catch (error) {
        displayError('Error loading receipt: ' + error.message);
      }
    }

    function formatMoney(value) {
      const number = Number(value || 0);
      const parts = number.toFixed(2).split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
      return `R ${parts[0]}.${parts[1]}`;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function getBankingInfo(receipt) {
      const invoice = receipt.invoice || {};
      const defaultInfo = [
        'Bank: FNB',
        'Account Name: Gerald Rushwaya',
        'Account No: 63125701268',
        'Branch Code: 250655',
        'Reference: Invoice #[invoice_number]',
      ].join('\n');
      const raw = invoice.payment_terms || defaultInfo;
      return raw.replace(/\#\[invoice_number\]/g, invoice.invoice_number || '');
    }

    function getQrMarkup(receipt) {
      const invoice = receipt.invoice || {};
      if (!invoice.qr_code_url) {
        return '';
      }
      const prefix = 'data:image/svg+xml;utf8,';
      if (invoice.qr_code_url.startsWith(prefix)) {
        const svg = decodeURIComponent(invoice.qr_code_url.slice(prefix.length));
        const base64 = btoa(unescape(encodeURIComponent(svg)));
        return `<img src="data:image/svg+xml;base64,${base64}" alt="QR Code">`;
      }
      return `<img src="${escapeAttr(invoice.qr_code_url)}" alt="QR Code">`;
    }

    function displayReceipt(receipt) {
      currentReceipt = receipt;
      const url = new URL(window.location.href);
      const autoDownload = url.searchParams.get('download') === '1';
      const invoice = receipt.invoice || {};
      const bankingInfo = getBankingInfo(receipt);
      const qrMarkup = getQrMarkup(receipt);
      const paymentDate = receipt.payment_date
        ? new Date(receipt.payment_date).toLocaleDateString()
        : new Date(receipt.created_at).toLocaleDateString();
      const isSettled = Number(receipt.balance_due || 0) <= 0.005;

      const html = `
        <div class="invoice-header">
          <div>
            <div class="company-name">Beplugged Tech</div>
            <div class="invoice-title">Payment Receipt</div>
            <div class="invoice-meta">Receipt #: <strong>${escapeHtml(receipt.receipt_number)}</strong></div>
          </div>
          <img src="/img/logo.png" alt="Beplugged Tech" class="brand-logo">
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
          <div>
            ${isSettled ? '<span class="paid-stamp">Paid in Full</span>' : '<span class="paid-stamp" style="border-color:var(--brand-primary); color:var(--brand-primary);">Part Payment</span>'}
          </div>
          <div style="text-align:right;">
            <p style="margin:0;"><strong>Payment Date:</strong> ${paymentDate}</p>
            ${invoice.invoice_number ? `<p style="margin:0;"><strong>For Invoice:</strong> ${escapeHtml(invoice.invoice_number)}</p>` : ''}
            ${receipt.payment_method ? `<p style="margin:0;"><strong>Method:</strong> ${escapeHtml(receipt.payment_method)}</p>` : ''}
          </div>
        </div>

        <div class="invoice-details">
          <div class="detail-section">
            <h3>Received From</h3>
            <p><strong>${escapeHtml(invoice.client_name || 'Client')}</strong></p>
            ${invoice.client_email ? `<p>${escapeHtml(invoice.client_email)}</p>` : ''}
            ${invoice.client_address ? `<p>${escapeHtml(invoice.client_address)}</p>` : ''}
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Description</th>
              <th style="text-align:right;">Amount</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Payment received${invoice.invoice_number ? ` for invoice ${escapeHtml(invoice.invoice_number)}` : ''}${receipt.notes ? ` - ${escapeHtml(receipt.notes)}` : ''}</td>
              <td style="text-align:right;">${formatMoney(receipt.amount)}</td>
            </tr>
          </tbody>
        </table>

        <div class="totals-footer">
          <div class="banking-info">
            <h3>Banking Details</h3>
            <p>${escapeHtml(bankingInfo)}</p>
          </div>
          <div class="summary">
            <div class="summary-row">
              <span>Invoice Total:</span>
              <span class="value">${formatMoney(receipt.invoice_total)}</span>
            </div>
            <div class="summary-row paid">
              <span class="label">This Payment:</span>
              <span class="value">${formatMoney(receipt.amount)}</span>
            </div>
            <div class="summary-row">
              <span>Total Paid to Date:</span>
              <span class="value">${formatMoney(receipt.total_paid)}</span>
            </div>
            <div class="summary-row total">
              <span class="label">Balance Due:</span>
              <span class="value">${formatMoney(receipt.balance_due)}</span>
            </div>
            ${qrMarkup ? `<div class="qr-below-total">${qrMarkup}</div>` : ''}
          </div>
        </div>

        <p style="text-align:center; color:var(--text-muted); margin-top:1rem;">
          Thank you for your payment.
        </p>
      `;

      document.getElementById('receipt-container').innerHTML = html;

      if (autoDownload) {
        setTimeout(() => downloadPDF(), 300);
      }
    }

    function displayError(message) {
      document.getElementById('receipt-container').innerHTML = `
        <div class="error"><p>${escapeHtml(message)}</p></div>
      `;
    }

    function downloadPDF() {
      if (!window.html2pdf) {
        window.print();
        return;
      }
      const target = document.getElementById('receipt-container');
      const filename = currentReceipt?.receipt_number
        ? `receipt-${currentReceipt.receipt_number}.pdf`
        : 'receipt.pdf';
      html2pdf()
        .set({
          margin: 8,
          filename,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        })
        .from(target)
        .save();
    }
  </script>
</body>
</html>
