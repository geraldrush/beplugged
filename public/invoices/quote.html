<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote View</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/font-awesome.min.css">
  <style>
    body {
      background-color: #f5f5f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 2rem 1rem;
    }

    .quote-container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 0.5rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .quote-header {
      border-bottom: 2px solid #ff6b35;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    .quote-header h1 {
      color: #ff6b35;
      margin: 0;
    }

    .quote-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .detail-section h3 {
      font-size: 0.875rem;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .detail-section p {
      margin: 0.25rem 0;
      color: #666;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
      border-top: 1px solid #ddd;
      padding-top: 1rem;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
    }

    .detail-item label {
      font-weight: 600;
      color: #333;
    }

    .detail-item .value {
      color: #666;
    }

    table {
      width: 100%;
      margin-bottom: 2rem;
      border-collapse: collapse;
    }

    table thead {
      background-color: #f8f9fa;
      border-bottom: 2px solid #ddd;
    }

    table th {
      padding: 0.75rem;
      text-align: left;
      font-weight: 600;
      color: #333;
    }

    table td {
      padding: 0.75rem;
      border-bottom: 1px solid #ddd;
    }

    .summary {
      margin-left: auto;
      width: 300px;
      margin-bottom: 2rem;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
    }

    .summary-row.total {
      border-top: 2px solid #ddd;
      border-bottom: 2px solid #ddd;
      padding: 1rem 0;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .summary-row.total .label {
      color: #ff6b35;
    }

    .summary-row.total .value {
      color: #ff6b35;
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #ddd;
    }

    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.25rem;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    .btn-primary {
      background-color: #ff6b35;
      color: white;
    }

    .btn-primary:hover {
      background-color: #e55a24;
    }

    .btn-secondary {
      background-color: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background-color: #5a6268;
    }

    .status-badge {
      display: inline-block;
      padding: 0.35rem 0.65rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-draft {
      background-color: #e2e3e5;
      color: #383d41;
    }

    .status-sent {
      background-color: #cfe2ff;
      color: #084298;
    }

    .status-viewed {
      background-color: #cff4fc;
      color: #055160;
    }

    .status-accepted {
      background-color: #d1e7dd;
      color: #0f5132;
    }

    .status-rejected {
      background-color: #f8d7da;
      color: #842029;
    }

    .loading {
      text-align: center;
      padding: 2rem;
    }

    .error {
      background-color: #f8d7da;
      color: #842029;
      padding: 1rem;
      border-radius: 0.25rem;
      border: 1px solid #f5c2c7;
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .quote-container {
        box-shadow: none;
        padding: 0;
      }

      .action-buttons {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .quote-details {
        grid-template-columns: 1fr;
      }

      .details-grid {
        grid-template-columns: 1fr;
      }

      .summary {
        width: 100%;
      }

      .action-buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="quote-container" id="quote-container">
    <div class="loading">
      <p>Loading quote...</p>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    document.addEventListener('DOMContentLoaded', async () => {
      const quoteId = window.location.pathname.split('/')[3];
      await loadQuote(quoteId);
    });

    async function loadQuote(quoteId) {
      try {
        const response = await fetch(`${API_BASE}/quote/${quoteId}`);
        const quote = await response.json();

        if (response.ok && quote.id) {
          displayQuote(quote);
        } else {
          displayError('Quote not found');
        }
      } catch (error) {
        displayError('Error loading quote: ' + error.message);
      }
    }

    function displayQuote(quote) {
      const items = JSON.parse(quote.items || '[]');
      let itemsHtml = '';
      let itemsTotal = 0;

      if (items.length > 0) {
        itemsHtml = items.map(item => {
          const amount = (item.quantity || 1) * (item.rate || 0);
          itemsTotal += amount;
          return `
            <tr>
              <td>${item.description || 'Item'}</td>
              <td style="text-align: center;">${item.quantity || 1}</td>
              <td style="text-align: right;">$${(item.rate || 0).toFixed(2)}</td>
              <td style="text-align: right;">$${amount.toFixed(2)}</td>
            </tr>
          `;
        }).join('');
      } else {
        itemsTotal = quote.amount;
        itemsHtml = `
          <tr>
            <td colspan="3">Services Rendered</td>
            <td style="text-align: right;">$${quote.amount.toFixed(2)}</td>
          </tr>
        `;
      }

      const total = quote.amount + quote.tax;

      const html = `
        <div class="quote-header">
          <h1>QUOTE</h1>
          <p>Quote #: <strong>${quote.quote_number}</strong></p>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
          <div>
            <p style="margin: 0;"><strong>Status:</strong> <span class="status-badge status-${quote.status}">${quote.status}</span></p>
          </div>
          <div style="text-align: right;">
            <p style="margin: 0;"><strong>Quote Date:</strong> ${new Date(quote.created_at).toLocaleDateString()}</p>
            ${quote.expiry_date ? `<p style="margin: 0;"><strong>Valid Until:</strong> ${new Date(quote.expiry_date).toLocaleDateString()}</p>` : ''}
          </div>
        </div>

        <div class="quote-details">
          <div class="detail-section">
            <h3>Quote For</h3>
            <p><strong>${quote.client_name}</strong></p>
            <p>${quote.client_email}</p>
            ${quote.client_address ? `<p>${quote.client_address}</p>` : ''}
          </div>
          <div class="detail-section">
            <h3>Validity</h3>
            <p>${quote.expiry_date ? new Date(quote.expiry_date).toLocaleDateString() : 'No expiry date set'}</p>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Description</th>
              <th style="text-align: center;">Quantity</th>
              <th style="text-align: right;">Rate</th>
              <th style="text-align: right;">Amount</th>
            </tr>
          </thead>
          <tbody>
            ${itemsHtml}
          </tbody>
        </table>

        <div class="summary">
          <div class="summary-row">
            <span>Subtotal:</span>
            <span class="value">$${quote.amount.toFixed(2)}</span>
          </div>
          <div class="summary-row">
            <span>Tax:</span>
            <span class="value">$${quote.tax.toFixed(2)}</span>
          </div>
          <div class="summary-row total">
            <span class="label">Total:</span>
            <span class="value">$${total.toFixed(2)}</span>
          </div>
        </div>

        ${quote.notes ? `
          <div style="margin-bottom: 2rem; padding: 1rem; background-color: #f8f9fa; border-radius: 0.25rem;">
            <strong>Notes:</strong>
            <p style="margin: 0.5rem 0 0 0; color: #666;">${quote.notes}</p>
          </div>
        ` : ''}

        <div class="action-buttons">
          <button class="btn btn-secondary" onclick="window.print()">
            <i class="fas fa-print"></i> Print
          </button>
          <button class="btn btn-primary" onclick="downloadPDF()">
            <i class="fas fa-download"></i> Download PDF
          </button>
        </div>
      `;

      document.getElementById('quote-container').innerHTML = html;
    }

    function displayError(message) {
      document.getElementById('quote-container').innerHTML = `
        <div class="error">
          <p>${message}</p>
        </div>
      `;
    }

    function downloadPDF() {
      alert('PDF download feature coming soon! You can use your browser\'s Print to PDF feature for now.');
    }
  </script>
</body>
</html>
