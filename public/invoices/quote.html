<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote View</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/font-awesome.min.css">
  <style>
    :root {
      --brand-primary: #F05023;
      --brand-primary-dark: #D94119;
      --brand-dark: #2C2D3F;
      --brand-muted: #ffffff;
      --text-muted: rgba(44, 45, 63, 0.7);
    }

    body {
      background-color: var(--brand-muted);
      font-family: 'Poppins', sans-serif;
      padding: 2rem 1rem;
      color: var(--brand-dark);
    }

    .quote-container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 0.5rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .quote-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--brand-primary);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-logo {
      width: 120px;
      height: auto;
    }

    .quote-title h1 {
      color: var(--brand-primary);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 1.5rem;
    }

    .quote-title p {
      margin: 0.25rem 0 0 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .quote-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .detail-section h3 {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .detail-section p {
      margin: 0.25rem 0;
      color: var(--text-muted);
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
      border-top: 1px solid rgba(44, 45, 63, 0.15);
      padding-top: 1rem;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
    }

    .detail-item label {
      font-weight: 600;
      color: var(--brand-dark);
    }

    .detail-item .value {
      color: var(--text-muted);
    }

    table {
      width: 100%;
      margin-bottom: 2rem;
      border-collapse: collapse;
    }

    table thead {
      background-color: #fff5f1;
      border-bottom: 2px solid rgba(240, 80, 35, 0.25);
    }

    table th {
      padding: 0.75rem;
      text-align: left;
      font-weight: 600;
      color: var(--brand-dark);
    }

    table td {
      padding: 0.75rem;
      border-bottom: 1px solid rgba(44, 45, 63, 0.12);
    }

    .summary {
      margin-left: auto;
      width: 300px;
      margin-bottom: 2rem;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
    }

    .summary-row.total {
      border-top: 2px solid rgba(44, 45, 63, 0.2);
      border-bottom: 2px solid rgba(44, 45, 63, 0.2);
      padding: 1rem 0;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .summary-row.total .label {
      color: var(--brand-primary);
    }

    .summary-row.total .value {
      color: var(--brand-primary);
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(44, 45, 63, 0.15);
    }

    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.25rem;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    .btn-primary {
      background-color: var(--brand-primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--brand-primary-dark);
    }

    .btn-secondary {
      background-color: var(--brand-dark);
      color: white;
    }

    .btn-secondary:hover {
      background-color: #1f2030;
    }

    .status-badge {
      display: inline-block;
      padding: 0.35rem 0.65rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-draft {
      background-color: rgba(44, 45, 63, 0.12);
      color: var(--brand-dark);
    }

    .status-sent {
      background-color: rgba(240, 80, 35, 0.18);
      color: var(--brand-primary);
    }

    .status-viewed {
      background-color: rgba(240, 80, 35, 0.28);
      color: var(--brand-dark);
    }

    .status-accepted {
      background-color: rgba(44, 45, 63, 0.15);
      color: var(--brand-dark);
    }

    .status-rejected {
      background-color: rgba(240, 80, 35, 0.2);
      color: var(--brand-dark);
    }

    .loading {
      text-align: center;
      padding: 2rem;
    }

    .error {
      background-color: rgba(240, 80, 35, 0.18);
      color: var(--brand-dark);
      padding: 1rem;
      border-radius: 0.25rem;
      border: 1px solid rgba(240, 80, 35, 0.35);
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .quote-container {
        box-shadow: none;
        padding: 0;
      }

      .action-buttons {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .quote-details {
        grid-template-columns: 1fr;
      }

      .details-grid {
        grid-template-columns: 1fr;
      }

      .summary {
        width: 100%;
      }

      .action-buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="quote-container" id="quote-container">
    <div class="loading">
      <p>Loading quote...</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    const API_BASE = '/api';
    let currentQuote = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const url = new URL(window.location.href);
      const quoteId = url.searchParams.get('id') || window.location.pathname.split('/')[3];
      if (!quoteId) {
        displayError('Quote ID missing');
        return;
      }
      await loadQuote(quoteId);
    });

    async function loadQuote(quoteId) {
      try {
        const response = await fetch(`${API_BASE}/quote/${quoteId}`);
        const quote = await response.json();

        if (response.ok && quote.id) {
          displayQuote(quote);
        } else {
          displayError('Quote not found');
        }
      } catch (error) {
        displayError('Error loading quote: ' + error.message);
      }
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function safeStatusClass(status) {
      return String(status || 'draft').replace(/[^a-z_]/g, '');
    }

    function displayStatus(status) {
      return escapeHtml(String(status || 'draft').replace(/_/g, ' '));
    }

    function displayQuote(quote) {
      currentQuote = quote;
      const url = new URL(window.location.href);
      const autoDownload = url.searchParams.get('download') === '1';
      const items = JSON.parse(quote.items || '[]');
      let itemsHtml = '';
      let itemsTotal = 0;

      if (items.length > 0) {
        itemsHtml = items.map(item => {
          const quantity = Number(item.quantity || 1);
          const rate = Number(item.rate || 0);
          const amount = quantity * rate;
          itemsTotal += amount;
          return `
            <tr>
              <td>${escapeHtml(item.description || 'Item')}</td>
              <td style="text-align: center;">${escapeHtml(quantity)}</td>
              <td style="text-align: right;">R${rate.toFixed(2)}</td>
              <td style="text-align: right;">R${amount.toFixed(2)}</td>
            </tr>
          `;
        }).join('');
      } else {
        itemsTotal = Number(quote.amount || 0);
        itemsHtml = `
          <tr>
            <td colspan="3">Services Rendered</td>
            <td style="text-align: right;">R${Number(quote.amount || 0).toFixed(2)}</td>
          </tr>
        `;
      }

      const total = Number(quote.amount || 0) + Number(quote.tax || 0);

      const html = `
        <div class="quote-header">
          <div class="brand">
            <img src="/img/logo.png" alt="BePlugged" class="brand-logo">
          </div>
          <div class="quote-title">
            <h1>Quote</h1>
            <p>Quote #: <strong>${escapeHtml(quote.quote_number)}</strong></p>
          </div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
          <div>
            <p style="margin: 0;"><strong>Status:</strong> <span class="status-badge status-${safeStatusClass(quote.status)}">${displayStatus(quote.status)}</span></p>
          </div>
          <div style="text-align: right;">
            <p style="margin: 0;"><strong>Quote Date:</strong> ${new Date(quote.created_at).toLocaleDateString()}</p>
            ${quote.expiry_date ? `<p style="margin: 0;"><strong>Valid Until:</strong> ${new Date(quote.expiry_date).toLocaleDateString()}</p>` : ''}
          </div>
        </div>

        <div class="quote-details">
          <div class="detail-section">
            <h3>Quote For</h3>
            <p><strong>${escapeHtml(quote.client_name)}</strong></p>
            <p>${escapeHtml(quote.client_email)}</p>
            ${quote.client_address ? `<p>${escapeHtml(quote.client_address)}</p>` : ''}
          </div>
          <div class="detail-section">
            <h3>Validity</h3>
            <p>${quote.expiry_date ? new Date(quote.expiry_date).toLocaleDateString() : 'No expiry date set'}</p>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Description</th>
              <th style="text-align: center;">Quantity</th>
              <th style="text-align: right;">Rate</th>
              <th style="text-align: right;">Amount</th>
            </tr>
          </thead>
          <tbody>
            ${itemsHtml}
          </tbody>
        </table>

        <div class="summary">
          <div class="summary-row">
            <span>Subtotal:</span>
            <span class="value">R${Number(quote.amount || 0).toFixed(2)}</span>
          </div>
          <div class="summary-row">
            <span>Tax / Adjustment:</span>
            <span class="value">R${Number(quote.tax || 0).toFixed(2)}</span>
          </div>
          <div class="summary-row total">
            <span class="label">Total:</span>
            <span class="value">R${total.toFixed(2)}</span>
          </div>
        </div>

        ${quote.notes ? `
          <div style="margin-bottom: 2rem; padding: 1rem; background-color: #fff5f1; border-radius: 0.25rem;">
            <strong>Notes:</strong>
            <p style="margin: 0.5rem 0 0 0; color: var(--text-muted);">${escapeHtml(quote.notes)}</p>
          </div>
        ` : ''}

        <div class="action-buttons" data-html2canvas-ignore="true">
          <button class="btn btn-secondary" onclick="window.print()">
            <i class="fas fa-print"></i> Print
          </button>
          <button class="btn btn-primary" onclick="downloadPDF()">
            <i class="fas fa-download"></i> Download PDF
          </button>
        </div>
      `;

      document.getElementById('quote-container').innerHTML = html;

      if (autoDownload) {
        setTimeout(() => downloadPDF(), 300);
      }
    }

    function displayError(message) {
      document.getElementById('quote-container').innerHTML = `
        <div class="error">
          <p>${escapeHtml(message)}</p>
        </div>
      `;
    }

    function downloadPDF() {
      if (!window.html2pdf) {
        window.print();
        return;
      }

      const target = document.getElementById('quote-container');
      const filename = currentQuote?.quote_number
        ? `quote-${currentQuote.quote_number}.pdf`
        : 'quote.pdf';

      html2pdf()
        .set({
          margin: 0.4,
          filename,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
        })
        .from(target)
        .save();
    }
  </script>
</body>
</html>
