<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice View</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/font-awesome.min.css">
  <style>
    :root {
      --brand-primary: #F05023;
      --brand-primary-dark: #D94119;
      --brand-dark: #2C2D3F;
      --brand-muted: #ffffff;
      --text-muted: rgba(44, 45, 63, 0.7);
    }

    body {
      background-color: var(--brand-muted);
      font-family: 'Poppins', sans-serif;
      padding: 2rem 1rem;
      color: var(--brand-dark);
    }

    .invoice-container {
      max-width: 210mm;
      width: 100%;
      min-height: 297mm;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 0.5rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    .invoice-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--brand-primary);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-logo {
      width: 120px;
      height: auto;
    }

    .company-name {
      color: var(--brand-dark);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 1.1rem;
    }

    .invoice-title {
      color: var(--brand-primary);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 1.35rem;
    }

    .invoice-meta {
      margin: 0.25rem 0 0 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .qr-below-total {
      margin-top: 0.75rem;
      display: flex;
      justify-content: flex-end;
    }

    .qr-below-total img {
      width: 70px;
      height: 70px;
      padding: 2px;
      background: #fff;
      border: 1px solid rgba(44, 45, 63, 0.2);
      border-radius: 0.25rem;
    }

    .totals-footer {
      display: flex;
      justify-content: space-between;
      gap: 2rem;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .totals-footer .summary {
      margin-bottom: 0;
    }

    .banking-info {
      flex: 1;
      min-width: 240px;
      margin-top: 1.25rem;
    }

    .banking-info h3 {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .banking-info p {
      margin: 0;
      color: var(--brand-dark);
      font-weight: 600;
      line-height: 1.4;
      white-space: pre-line;
    }

    .invoice-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .detail-section h3 {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .detail-section p {
      margin: 0.25rem 0;
      color: var(--text-muted);
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
      border-top: 1px solid rgba(44, 45, 63, 0.15);
      padding-top: 1rem;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
    }

    .detail-item label {
      font-weight: 600;
      color: var(--brand-dark);
    }

    .detail-item .value {
      color: var(--text-muted);
    }

    table {
      width: 100%;
      margin-bottom: 2rem;
      border-collapse: collapse;
    }

    table thead {
      background-color: #fff5f1;
      border-bottom: 2px solid rgba(240, 80, 35, 0.25);
    }

    table th {
      padding: 0.75rem;
      text-align: left;
      font-weight: 600;
      color: var(--brand-dark);
    }

    table td {
      padding: 0.75rem;
      border-bottom: 1px solid rgba(44, 45, 63, 0.12);
    }

    .summary {
      width: 300px;
      margin-bottom: 0;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
    }

    .summary-row.total {
      border-top: 2px solid rgba(44, 45, 63, 0.2);
      border-bottom: 2px solid rgba(44, 45, 63, 0.2);
      padding: 1rem 0;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .summary-row.total .label {
      color: var(--brand-primary);
    }

    .summary-row.total .value {
      color: var(--brand-primary);
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(44, 45, 63, 0.15);
    }

    .action-buttons.outside {
      max-width: 210mm;
      margin: 1rem auto 0;
      padding-top: 0;
      border-top: none;
    }

    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.25rem;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    .btn-primary {
      background-color: var(--brand-primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--brand-primary-dark);
    }

    .btn-secondary {
      background-color: var(--brand-dark);
      color: white;
    }

    .btn-secondary:hover {
      background-color: #1f2030;
    }

    .status-badge {
      display: inline-block;
      padding: 0.35rem 0.65rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-draft {
      background-color: rgba(44, 45, 63, 0.12);
      color: var(--brand-dark);
    }

    .status-sent {
      background-color: rgba(240, 80, 35, 0.18);
      color: var(--brand-primary);
    }

    .status-viewed {
      background-color: rgba(240, 80, 35, 0.28);
      color: var(--brand-dark);
    }

    .status-paid {
      background-color: rgba(44, 45, 63, 0.15);
      color: var(--brand-dark);
    }

    .status-partially_paid {
      background-color: rgba(31, 138, 82, 0.18);
      color: #176b3f;
    }

    .loading {
      text-align: center;
      padding: 2rem;
    }

    .error {
      background-color: rgba(240, 80, 35, 0.18);
      color: var(--brand-dark);
      padding: 1rem;
      border-radius: 0.25rem;
      border: 1px solid rgba(240, 80, 35, 0.35);
    }

    @media print {
      @page {
        size: A4;
        margin: 10mm;
      }

      body {
        background: white;
        padding: 0;
      }

      .invoice-container {
        box-shadow: none;
        padding: 12mm;
        width: 210mm;
        min-height: 297mm;
      }

      .action-buttons {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .invoice-container {
        min-height: auto;
      }

      .totals-footer {
        flex-direction: column;
      }

      .invoice-details {
        grid-template-columns: 1fr;
      }

      .details-grid {
        grid-template-columns: 1fr;
      }

      .summary {
        width: 100%;
      }

      .action-buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="invoice-container" id="invoice-container">
    <div class="loading">
      <p>Loading invoice...</p>
    </div>
  </div>
  <div class="action-buttons outside">
    <button class="btn btn-secondary" onclick="window.print()">
      <i class="fas fa-print"></i> Print
    </button>
    <button class="btn btn-primary" onclick="downloadPDF()">
      <i class="fas fa-download"></i> Download PDF
    </button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    const API_BASE = '/api';
    let currentInvoice = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const url = new URL(window.location.href);
      const invoiceId = url.searchParams.get('id') || window.location.pathname.split('/')[3];
      if (!invoiceId) {
        displayError('Invoice ID missing');
        return;
      }
      await loadInvoice(invoiceId);
    });

    async function loadInvoice(invoiceId) {
      try {
        const response = await fetch(`${API_BASE}/invoice/${invoiceId}`);
        const invoice = await response.json();

        if (response.ok && invoice.id) {
          displayInvoice(invoice);
        } else {
          displayError('Invoice not found');
        }
      } catch (error) {
        displayError('Error loading invoice: ' + error.message);
      }
    }

    function formatMoney(value) {
      const number = Number(value || 0);
      const parts = number.toFixed(2).split(".");
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, " ");
      return `R ${parts[0]}.${parts[1]}`;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function safeStatusClass(status) {
      return String(status || "draft").replace(/[^a-z_]/g, "");
    }

    function displayStatus(status) {
      return escapeHtml(String(status || "draft").replace(/_/g, " "));
    }

    function getBankingInfo(invoice) {
      const defaultInfo = [
        "Bank: FNB",
        "Account Name: Gerald Rushwaya",
        "Account No: 63125701268",
        "Branch Code: 250655",
        "Reference: Invoice #[invoice_number]",
      ].join("\n");

      const raw = invoice.payment_terms || defaultInfo;
      return raw.replace(/\#\[invoice_number\]/g, invoice.invoice_number);
    }

    function getQrMarkup(invoice) {
      if (!invoice.qr_code_url) {
        return "";
      }
      const prefix = "data:image/svg+xml;utf8,";
      if (invoice.qr_code_url.startsWith(prefix)) {
        const svg = decodeURIComponent(invoice.qr_code_url.slice(prefix.length));
        const base64 = btoa(unescape(encodeURIComponent(svg)));
        return `<img src="data:image/svg+xml;base64,${base64}" alt="QR Code">`;
      }
      return `<img src="${escapeAttr(invoice.qr_code_url)}" alt="QR Code">`;
    }

    function displayInvoice(invoice) {
      currentInvoice = invoice;
      const url = new URL(window.location.href);
      const autoDownload = url.searchParams.get('download') === '1';
      const items = JSON.parse(invoice.items || '[]');
      let itemsHtml = '';
      let itemsTotal = 0;
      let grossSubtotal = 0;
      let totalDiscount = 0;
      const bankingInfo = getBankingInfo(invoice);
      const qrMarkup = getQrMarkup(invoice);

      if (items.length > 0) {
        itemsHtml = items.map(item => {
          const quantity = Number(item.quantity || 1);
          const rate = Number(item.rate || 0);
          const amount = quantity * rate;
          const discount = Number(item.discount || 0);
          grossSubtotal += amount;
          const lineTotal = Math.max(amount - discount, 0);
          itemsTotal += lineTotal;
          totalDiscount += discount;
          return `
            <tr>
              <td>${escapeHtml(item.description || 'Item')}</td>
              <td style="text-align: center;">${escapeHtml(quantity)}</td>
              <td style="text-align: right;">${formatMoney(rate)}</td>
              <td style="text-align: right;">${formatMoney(discount)}</td>
              <td style="text-align: right;">${formatMoney(lineTotal)}</td>
            </tr>
          `;
        }).join('');
      } else {
        itemsTotal = Number(invoice.amount || 0);
        grossSubtotal = Number(invoice.amount || 0);
        itemsHtml = `
          <tr>
            <td colspan="4">Services Rendered</td>
            <td style="text-align: right;">${formatMoney(invoice.amount)}</td>
          </tr>
        `;
      }

      const subtotal = items.length ? grossSubtotal : invoice.amount;
      const netSubtotal = items.length ? itemsTotal : invoice.amount;
      const total = Number(netSubtotal || 0) + Number(invoice.tax || 0);

      const html = `
        <div class="invoice-header">
          <div>
            <div class="company-name">Beplugged Tech</div>
            <div class="invoice-title">Invoice</div>
            <div class="invoice-meta">Invoice #: <strong>${escapeHtml(invoice.invoice_number)}</strong></div>
          </div>
          <img src="/img/logo.png" alt="Beplugged Tech" class="brand-logo">
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
          <div>
            <p style="margin: 0;"><strong>Status:</strong> <span class="status-badge status-${safeStatusClass(invoice.status)}">${displayStatus(invoice.status)}</span></p>
          </div>
          <div style="text-align: right;">
            <p style="margin: 0;"><strong>Invoice Date:</strong> ${new Date(invoice.created_at).toLocaleDateString()}</p>
            ${invoice.due_date ? `<p style="margin: 0;"><strong>Due Date:</strong> ${new Date(invoice.due_date).toLocaleDateString()}</p>` : ''}
          </div>
        </div>

        <div class="invoice-details">
          <div class="detail-section">
            <h3>Bill To</h3>
            <p><strong>${escapeHtml(invoice.client_name)}</strong></p>
            <p>${escapeHtml(invoice.client_email)}</p>
            ${invoice.client_address ? `<p>${escapeHtml(invoice.client_address)}</p>` : ''}
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Description</th>
              <th style="text-align: center;">Quantity</th>
              <th style="text-align: right;">Rate</th>
              <th style="text-align: right;">Discount</th>
              <th style="text-align: right;">Amount</th>
            </tr>
          </thead>
          <tbody>
            ${itemsHtml}
          </tbody>
        </table>

        <div class="totals-footer">
          <div class="banking-info">
            <h3>Banking Details</h3>
            <p>${escapeHtml(bankingInfo)}</p>
          </div>
          <div class="summary">
            <div class="summary-row">
              <span>Subtotal:</span>
              <span class="value">${formatMoney(subtotal)}</span>
            </div>
            ${totalDiscount > 0 ? `
            <div class="summary-row">
              <span>Discount:</span>
              <span class="value">-${formatMoney(totalDiscount)}</span>
            </div>
            ` : ''}
            <div class="summary-row">
              <span>Tax / Adjustment:</span>
              <span class="value">${formatMoney(invoice.tax)}</span>
            </div>
            <div class="summary-row total">
              <span class="label">Total:</span>
              <span class="value">${formatMoney(total)}</span>
            </div>
            ${Number(invoice.total_paid || 0) > 0 ? `
            <div class="summary-row">
              <span>Paid:</span>
              <span class="value" style="color:#1f8a52;">-${formatMoney(invoice.total_paid)}</span>
            </div>
            <div class="summary-row total">
              <span class="label">Balance Due:</span>
              <span class="value">${formatMoney(invoice.balance_due)}</span>
            </div>
            ` : ''}
            ${qrMarkup ? `<div class="qr-below-total">${qrMarkup}</div>` : ""}
          </div>
        </div>

        ${invoice.notes ? `
          <div style="margin-bottom: 2rem; padding: 1rem; background-color: #fff5f1; border-radius: 0.25rem;">
            <strong>Notes:</strong>
            <p style="margin: 0.5rem 0 0 0; color: var(--text-muted);">${escapeHtml(invoice.notes)}</p>
          </div>
        ` : ''}

      `;

      document.getElementById('invoice-container').innerHTML = html;

      if (autoDownload) {
        setTimeout(() => downloadPDF(), 300);
      }
    }

    function displayError(message) {
      document.getElementById('invoice-container').innerHTML = `
        <div class="error">
          <p>${escapeHtml(message)}</p>
        </div>
      `;
    }

    function downloadPDF() {
      if (!window.html2pdf) {
        window.print();
        return;
      }

      const target = document.getElementById('invoice-container');
      const filename = currentInvoice?.invoice_number
        ? `invoice-${currentInvoice.invoice_number}.pdf`
        : 'invoice.pdf';

      // The container uses min-height:297mm and a shadow to look like A4 on
      // screen. html2pdf captures the element as-is, so that fixed height forces
      // a near-empty second page and top/bottom white space. Neutralise it for
      // the capture, then restore.
      const prev = target.getAttribute('style') || '';
      target.style.minHeight = 'auto';
      target.style.height = 'auto';
      target.style.boxShadow = 'none';
      target.style.borderRadius = '0';
      target.style.margin = '0';
      target.style.width = '210mm';
      target.style.padding = '12mm';

      const restore = () => target.setAttribute('style', prev);

      html2pdf()
        .set({
          margin: 0,
          filename,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true, windowWidth: target.scrollWidth },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
          pagebreak: { mode: ['avoid-all', 'css', 'legacy'] },
        })
        .from(target)
        .save()
        .then(restore)
        .catch(restore);
    }
  </script>
</body>
</html>
