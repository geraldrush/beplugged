<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice View</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/font-awesome.min.css">
  <style>
    :root {
      --brand-primary: #F05023;
      --brand-primary-dark: #D94119;
      --brand-dark: #2C2D3F;
      --brand-muted: #ffffff;
      --text-muted: rgba(44, 45, 63, 0.7);
    }

    body {
      background-color: var(--brand-muted);
      font-family: 'Poppins', sans-serif;
      padding: 2rem 1rem;
      color: var(--brand-dark);
    }

    .invoice-container {
      max-width: 210mm;
      width: 100%;
      min-height: 297mm;
      margin: 0 auto;
      background: white;
      padding: 2rem 2rem 5rem;
      border-radius: 0.5rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    .invoice-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--brand-primary);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-logo {
      width: 120px;
      height: auto;
    }

    .company-name {
      color: var(--brand-dark);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 1.1rem;
    }

    .invoice-title {
      color: var(--brand-primary);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 1.35rem;
    }

    .invoice-meta {
      margin: 0.25rem 0 0 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .qr-corner {
      position: absolute;
      right: 1rem;
      bottom: 1rem;
      width: 64px;
      height: 64px;
      padding: 2px;
      background: #fff;
      border: 1px solid rgba(44, 45, 63, 0.2);
      border-radius: 0.25rem;
    }

    .invoice-footer {
      position: absolute;
      left: 2rem;
      bottom: 2rem;
      max-width: 60%;
    }

    .invoice-footer h3 {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .invoice-footer p {
      margin: 0;
      color: var(--brand-dark);
      font-weight: 600;
    }

    .invoice-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .detail-section h3 {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .detail-section p {
      margin: 0.25rem 0;
      color: var(--text-muted);
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
      border-top: 1px solid rgba(44, 45, 63, 0.15);
      padding-top: 1rem;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
    }

    .detail-item label {
      font-weight: 600;
      color: var(--brand-dark);
    }

    .detail-item .value {
      color: var(--text-muted);
    }

    table {
      width: 100%;
      margin-bottom: 2rem;
      border-collapse: collapse;
    }

    table thead {
      background-color: #fff5f1;
      border-bottom: 2px solid rgba(240, 80, 35, 0.25);
    }

    table th {
      padding: 0.75rem;
      text-align: left;
      font-weight: 600;
      color: var(--brand-dark);
    }

    table td {
      padding: 0.75rem;
      border-bottom: 1px solid rgba(44, 45, 63, 0.12);
    }

    .summary {
      margin-left: auto;
      width: 300px;
      margin-bottom: 2rem;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
    }

    .summary-row.total {
      border-top: 2px solid rgba(44, 45, 63, 0.2);
      border-bottom: 2px solid rgba(44, 45, 63, 0.2);
      padding: 1rem 0;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .summary-row.total .label {
      color: var(--brand-primary);
    }

    .summary-row.total .value {
      color: var(--brand-primary);
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(44, 45, 63, 0.15);
    }

    .action-buttons.outside {
      max-width: 210mm;
      margin: 1rem auto 0;
      padding-top: 0;
      border-top: none;
    }

    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.25rem;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    .btn-primary {
      background-color: var(--brand-primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--brand-primary-dark);
    }

    .btn-secondary {
      background-color: var(--brand-dark);
      color: white;
    }

    .btn-secondary:hover {
      background-color: #1f2030;
    }

    .status-badge {
      display: inline-block;
      padding: 0.35rem 0.65rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-draft {
      background-color: rgba(44, 45, 63, 0.12);
      color: var(--brand-dark);
    }

    .status-sent {
      background-color: rgba(240, 80, 35, 0.18);
      color: var(--brand-primary);
    }

    .status-viewed {
      background-color: rgba(240, 80, 35, 0.28);
      color: var(--brand-dark);
    }

    .status-paid {
      background-color: rgba(44, 45, 63, 0.15);
      color: var(--brand-dark);
    }

    .loading {
      text-align: center;
      padding: 2rem;
    }

    .error {
      background-color: rgba(240, 80, 35, 0.18);
      color: var(--brand-dark);
      padding: 1rem;
      border-radius: 0.25rem;
      border: 1px solid rgba(240, 80, 35, 0.35);
    }

    @media print {
      @page {
        size: A4;
        margin: 10mm;
      }

      body {
        background: white;
        padding: 0;
      }

      .invoice-container {
        box-shadow: none;
        padding: 0;
        width: 210mm;
        min-height: 297mm;
      }

      .action-buttons {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .invoice-container {
        min-height: auto;
      }

      .invoice-footer {
        position: static;
        margin-top: 1.5rem;
        max-width: 100%;
      }

      .qr-corner {
        position: static;
        margin-top: 1rem;
      }

      .invoice-details {
        grid-template-columns: 1fr;
      }

      .details-grid {
        grid-template-columns: 1fr;
      }

      .summary {
        width: 100%;
      }

      .action-buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="invoice-container" id="invoice-container">
    <div class="loading">
      <p>Loading invoice...</p>
    </div>
  </div>
  <div class="action-buttons outside">
    <button class="btn btn-secondary" onclick="window.print()">
      <i class="fas fa-print"></i> Print
    </button>
    <button class="btn btn-primary" onclick="downloadPDF()">
      <i class="fas fa-download"></i> Download PDF
    </button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    const API_BASE = '/api';
    let currentInvoice = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const url = new URL(window.location.href);
      const invoiceId = url.searchParams.get('id') || window.location.pathname.split('/')[3];
      if (!invoiceId) {
        displayError('Invoice ID missing');
        return;
      }
      await loadInvoice(invoiceId);
    });

    async function loadInvoice(invoiceId) {
      try {
        const response = await fetch(`${API_BASE}/invoice/${invoiceId}`);
        const invoice = await response.json();

        if (response.ok && invoice.id) {
          displayInvoice(invoice);
        } else {
          displayError('Invoice not found');
        }
      } catch (error) {
        displayError('Error loading invoice: ' + error.message);
      }
    }

    function displayInvoice(invoice) {
      currentInvoice = invoice;
      const url = new URL(window.location.href);
      const autoDownload = url.searchParams.get('download') === '1';
      const items = JSON.parse(invoice.items || '[]');
      let itemsHtml = '';
      let itemsTotal = 0;
      let grossSubtotal = 0;
      let totalDiscount = 0;

      if (items.length > 0) {
        itemsHtml = items.map(item => {
          const amount = (item.quantity || 1) * (item.rate || 0);
          const discount = item.discount || 0;
          grossSubtotal += amount;
          const lineTotal = Math.max(amount - discount, 0);
          itemsTotal += lineTotal;
          totalDiscount += discount;
          return `
            <tr>
              <td>${item.description || 'Item'}</td>
              <td style="text-align: center;">${item.quantity || 1}</td>
              <td style="text-align: right;">R${(item.rate || 0).toFixed(2)}</td>
              <td style="text-align: right;">R${discount.toFixed(2)}</td>
              <td style="text-align: right;">R${lineTotal.toFixed(2)}</td>
            </tr>
          `;
        }).join('');
      } else {
        itemsTotal = invoice.amount;
        grossSubtotal = invoice.amount;
        itemsHtml = `
          <tr>
            <td colspan="4">Services Rendered</td>
            <td style="text-align: right;">R${invoice.amount.toFixed(2)}</td>
          </tr>
        `;
      }

      const subtotal = items.length ? grossSubtotal : invoice.amount;
      const netSubtotal = items.length ? itemsTotal : invoice.amount;
      const total = netSubtotal + invoice.tax;

      const html = `
        <div class="invoice-header">
          <div>
            <div class="company-name">Beplugged Tech</div>
            <div class="invoice-title">Invoice</div>
            <div class="invoice-meta">Invoice #: <strong>${invoice.invoice_number}</strong></div>
          </div>
          <img src="/img/logo.png" alt="Beplugged Tech" class="brand-logo">
        </div>

        ${invoice.qr_code_url ? `<img class="qr-corner" src="${invoice.qr_code_url}" alt="QR Code">` : ""}

        <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
          <div>
            <p style="margin: 0;"><strong>Status:</strong> <span class="status-badge status-${invoice.status}">${invoice.status}</span></p>
          </div>
          <div style="text-align: right;">
            <p style="margin: 0;"><strong>Invoice Date:</strong> ${new Date(invoice.created_at).toLocaleDateString()}</p>
            ${invoice.due_date ? `<p style="margin: 0;"><strong>Due Date:</strong> ${new Date(invoice.due_date).toLocaleDateString()}</p>` : ''}
          </div>
        </div>

        <div class="invoice-details">
          <div class="detail-section">
            <h3>Bill To</h3>
            <p><strong>${invoice.client_name}</strong></p>
            <p>${invoice.client_email}</p>
            ${invoice.client_address ? `<p>${invoice.client_address}</p>` : ''}
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Description</th>
              <th style="text-align: center;">Quantity</th>
              <th style="text-align: right;">Rate</th>
              <th style="text-align: right;">Discount</th>
              <th style="text-align: right;">Amount</th>
            </tr>
          </thead>
          <tbody>
            ${itemsHtml}
          </tbody>
        </table>

        <div class="summary">
          <div class="summary-row">
            <span>Subtotal:</span>
            <span class="value">R${subtotal.toFixed(2)}</span>
          </div>
          ${totalDiscount > 0 ? `
          <div class="summary-row">
            <span>Discount:</span>
            <span class="value">-R${totalDiscount.toFixed(2)}</span>
          </div>
          ` : ''}
          <div class="summary-row">
            <span>Tax:</span>
            <span class="value">R${invoice.tax.toFixed(2)}</span>
          </div>
          <div class="summary-row total">
            <span class="label">Total Due:</span>
            <span class="value">R${total.toFixed(2)}</span>
          </div>
        </div>

        ${invoice.notes ? `
          <div style="margin-bottom: 2rem; padding: 1rem; background-color: #fff5f1; border-radius: 0.25rem;">
            <strong>Notes:</strong>
            <p style="margin: 0.5rem 0 0 0; color: var(--text-muted);">${invoice.notes}</p>
          </div>
        ` : ''}

        <div class="invoice-footer">
          <h3>Payment Terms</h3>
          <p>${invoice.payment_terms || 'Net 30'}</p>
        </div>

      `;

      document.getElementById('invoice-container').innerHTML = html;

      if (autoDownload) {
        setTimeout(() => downloadPDF(), 300);
      }
    }

    function displayError(message) {
      document.getElementById('invoice-container').innerHTML = `
        <div class="error">
          <p>${message}</p>
        </div>
      `;
    }

    function downloadPDF() {
      if (!window.html2pdf) {
        window.print();
        return;
      }

      const target = document.getElementById('invoice-container');
      const filename = currentInvoice?.invoice_number
        ? `invoice-${currentInvoice.invoice_number}.pdf`
        : 'invoice.pdf';

      html2pdf()
        .set({
          margin: 0.4,
          filename,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
        })
        .from(target)
        .save();
    }
  </script>
</body>
</html>
